<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1,viewport-fit=cover" name="viewport"/>
<title data-i18n="book:page.title">AcuTwin — Онлайн-запись</title>
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="tailwind.css?v=2">
<link href="fonts.css?v=2" rel="stylesheet"/>
<link href="design.css?v=3" rel="stylesheet"/>
<meta name="theme-color" content="#131313">
<style>
.wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
.head { text-align:center; margin-bottom:28px; }
.brand { font-size:14px; color:#0A84FF; font-weight:700; letter-spacing:.04em; text-transform:uppercase; }
.title { font-family:'Hanken Grotesk',sans-serif; font-size:26px; font-weight:800; margin-top:6px; }
.subtitle { font-size:14px; color:#8b90a0; margin-top:4px; }

.card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:18px; margin-bottom:16px; }
.card-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#8b90a0; margin-bottom:12px; }

.date-row { display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none; }
.date-row::-webkit-scrollbar { display:none; }
.date-btn { flex:0 0 64px; text-align:center; padding:8px 4px; border-radius:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); cursor:pointer; transition:all .15s; }
.date-btn:hover { border-color:rgba(10,132,255,0.4); }
.date-btn.active { background:rgba(10,132,255,0.18); border-color:#0A84FF; color:#0A84FF; }
.date-btn .dow { font-size:10px; color:#8b90a0; text-transform:uppercase; letter-spacing:.04em; }
.date-btn.active .dow { color:#0A84FF; opacity:.85; }
.date-btn .day { font-size:18px; font-weight:700; margin-top:2px; }
.date-btn .mo  { font-size:9px; color:#8b90a0; }

.slots-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(82px,1fr)); gap:8px; }
.slot {
  text-align:center; padding:9px 4px; border-radius:10px;
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
  font-size:13px; font-weight:600; cursor:pointer; transition:all .15s;
}
.slot:hover:not(.taken):not(.active) { border-color:rgba(10,132,255,0.4); background:rgba(10,132,255,0.06); }
.slot.taken { opacity:0.32; cursor:not-allowed; text-decoration:line-through; }
.slot.active { background:rgba(10,132,255,0.18); border-color:#0A84FF; color:#0A84FF; }
.slot-empty { font-size:13px; color:#8b90a0; text-align:center; padding:18px 0; }

.fld-label { font-size:11px; color:#8b90a0; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; display:block; }
.fld { width:100%; background:#1a1a2a; border:1px solid #414755; border-radius:10px; padding:10px 12px; font-size:14px; color:#e2e2e2; outline:none; transition:border-color .15s; }
.fld:focus { border-color:#0A84FF; }
textarea.fld { resize:vertical; min-height:64px; }

.btn-primary { width:100%; background:#0A84FF; color:#fff; border:none; padding:14px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; transition:background .15s; }
.btn-primary:hover { background:#0a6ed4; }
.btn-primary:disabled { background:#2a2a35; color:#6b7280; cursor:not-allowed; }

.success { text-align:center; padding:40px 20px; }
.success-icon { font-size:64px; color:#30D158; }
.success-title { font-size:22px; font-weight:700; margin:14px 0 6px; font-family:'Hanken Grotesk',sans-serif; }
.success-text { font-size:14px; color:#8b90a0; line-height:1.5; }
.summary { background:rgba(48,209,88,0.06); border:1px solid rgba(48,209,88,0.2); border-radius:12px; padding:14px; margin-top:16px; text-align:left; font-size:13px; color:#c1c6d7; }
.summary-row { display:flex; gap:10px; margin-bottom:4px; }
.summary-row .lbl { color:#8b90a0; min-width:70px; }

.err { background:rgba(255,69,58,0.12); border:1px solid rgba(255,69,58,0.35); color:#FF453A; font-size:13px; padding:10px 12px; border-radius:10px; margin-top:10px; }
.brand-bar { font-size:11px; color:#6b7280; text-align:center; margin-top:24px; }
.brand-bar a { color:#0A84FF; text-decoration:none; }

/* Embed-режим: сайт клиники встроил наш виджет в iframe */ /* i18n-ok */
body.acutwin-embed #staff-bar { display:none !important; }
body.acutwin-embed .brand-bar { display:none; }
body.acutwin-embed .head .brand { display:none; }
body.acutwin-embed .wrap { padding-top:16px; }
</style>
</head>
<body class="bg-[#131313] text-[#e2e2e2] min-h-screen" style="font-family:'Inter',sans-serif">

<div id="staff-bar" style="display:none;position:sticky;top:0;z-index:10;background:rgba(10,132,255,0.12);border-bottom:1px solid rgba(10,132,255,0.3);padding:10px 16px;font-size:12px;color:#0A84FF;text-align:center">
  <span data-i18n="book:page.staffBadge">👁 Превью публичной страницы</span> · <a href="/profile.html" style="color:#fff;text-decoration:underline"><span data-i18n="book:page.staffBack">← Назад в АкуТвин</span></a>
</div>

<div class="wrap">
  <div class="head">
    <div class="brand" data-i18n="book:page.brand">AcuTwin · Онлайн-запись</div>
    <h1 class="title" id="doc-name" data-i18n="common:action.loading">Загрузка...</h1>
    <div class="subtitle" id="doc-clinic"></div>
    <div id="back-to-clinic" style="margin-top:10px"></div>
  </div>

  <div id="step-booking">

    <div class="card">
      <div class="card-title" data-i18n="book:step.selectDay">Выберите день</div>
      <div class="date-row" id="dates"></div>
    </div>

    <div class="card">
      <div class="card-title"><span data-i18n="book:step.selectTime">Выберите время</span> <span id="slot-date" style="color:#0A84FF;font-weight:700"></span></div>
      <div class="slots-grid" id="slots"></div>
    </div>

    <div class="card">
      <div class="card-title" data-i18n="book:step.yourData">Ваши данные</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div>
          <label class="fld-label" data-i18n="book:form.name">ФИО *</label>
          <input id="f-patient" class="fld" data-i18n-placeholder="book:form.namePlaceholder" placeholder="Иванов Иван Иванович" autocomplete="name">
        </div>
        <div>
          <label class="fld-label" data-i18n="book:form.phone">Телефон *</label>
          <input id="f-phone" type="tel" class="fld" placeholder="+7 (___) ___-__-__" autocomplete="tel" value="+7 ">
        </div>
        <div>
          <label class="fld-label" data-i18n="book:form.email">Email (для подтверждения)</label>
          <input id="f-email" type="email" class="fld" placeholder="example@mail.ru" autocomplete="email">
        </div>
        <div>
          <label class="fld-label" data-i18n="book:form.complaint">Жалобы или причина обращения</label>
          <textarea id="f-reason" class="fld" data-i18n-placeholder="book:form.complaintPlaceholder" placeholder="Кратко опишите, что беспокоит..."></textarea>
        </div>
      </div>
      <div id="err" class="err" style="display:none"></div>
      <button id="submit-btn" class="btn-primary" style="margin-top:18px" data-i18n="book:form.submit" onclick="submitBooking()">Записаться</button>
    </div>

    <div class="brand-bar" id="brand-footer"></div>

  </div>

  <div id="step-success" class="card success" style="display:none">
    <div class="success-icon">✓</div>
    <div class="success-title" data-i18n="book:success.title">Заявка принята</div>
    <div class="success-text" data-i18n="book:success.text">Врач свяжется с вами в течение дня для подтверждения времени.</div>
    <div class="summary" id="summary"></div>
    <div style="margin-top:22px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn-primary" style="width:auto;padding:11px 24px" data-i18n="book:success.bookAgain" onclick="location.reload()">Записаться ещё</button>
      <a href="https://acutwin.ru" style="display:inline-flex;align-items:center;padding:11px 24px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#c1c6d7;text-decoration:none;font-size:15px;font-weight:600"data-i18n="book:success.home">На главную</a>
    </div>
  </div>

</div>

<script type="module">
import { initI18n, t } from '/i18n.js';

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t(el.getAttribute('data-i18n'));
    if (v) el.textContent = v;
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const v = t(el.getAttribute('data-i18n-placeholder'));
    if (v) el.placeholder = v;
  });
  const bf = document.getElementById('brand-footer');
  if (bf) bf.innerHTML = t('book:footer.prefix') + '<a href="https://acutwin.ru" target="_blank">AcuTwin</a>' + t('book:footer.suffix');
}

const params = new URLSearchParams(location.search);
const doctorUsername = params.get('doctor');
const clinicSlug     = params.get('clinic');
const isEmbed        = params.get('embed') === '1';
const utmSource      = params.get('utm_source');
const utmMedium      = params.get('utm_medium');

if (isEmbed) {
  document.body.classList.add('acutwin-embed');
  // постим родителю результат записи
  window._acutwinPostBooked = () => { try { window.parent.postMessage({ type:'acutwin:booked' }, '*'); } catch (e) {} };
} else if (sessionStorage.getItem('acutwin_token')) {
  document.getElementById('staff-bar').style.display = 'block';
}

let selectedDate = null;          // Date object (00:00 локально)
let selectedSlotISO = null;
let busySlots = [];               // [{start_at, duration_min}]
let doctorInfo = null;
const SLOT_DURATION = 60;         // мин
const HOUR_START = 8;
const HOUR_END   = 21;

initI18n().then(() => {
  applyI18n();
  document.title = t('book:page.title');
  if (!doctorUsername) {
    document.getElementById('doc-name').textContent = t('book:doctor.notSpecified');
    document.getElementById('step-booking').style.display = 'none';
  } else {
    init();
  }
});

window.submitBooking = submitBooking;
window.selectDate    = selectDate;
window.selectSlot    = selectSlot;

async function init() {
  try {
    const r = await fetch('/api/public/doctor/' + encodeURIComponent(doctorUsername));
    if (!r.ok) throw new Error();
    doctorInfo = await r.json();
    document.getElementById('doc-name').textContent = t('book:doctor.prefix') + doctorInfo.name;
    const clinic = (doctorInfo.clinic && doctorInfo.clinic.name) || doctorInfo.clinic || '';
    document.getElementById('doc-clinic').textContent = clinic;
    document.title = t('book:doctor.titlePrefix') + doctorInfo.name;
    const backSlug = clinicSlug || (doctorInfo.clinic && doctorInfo.clinic.slug);
    if (backSlug) {
      document.getElementById('back-to-clinic').innerHTML = `<a href="/c/${encodeURIComponent(backSlug)}" style="font-size:12px;color:#0A84FF;text-decoration:none">${t('book:doctor.backToClinic')}</a>`;
    }
  } catch {
    document.getElementById('doc-name').textContent = t('book:doctor.notFound');
    document.getElementById('step-booking').style.display = 'none';
    return;
  }
  renderDates();
  selectDate(0);   // Выбрать ближайшую дату по умолчанию
}

function renderDates() {
  const today = new Date(); today.setHours(0,0,0,0);
  const cont = document.getElementById('dates');
  const items = [];
  for (let i = 0; i < 14; i++) {
    const d = new Date(today); d.setDate(d.getDate()+i);
    const dow = t('book:dow.' + d.getDay()); /* i18n-ok */
    const mo  = d.toLocaleDateString('ru', { month:'short' });
    items.push(`<div class="date-btn" data-i="${i}" onclick="selectDate(${i})">
      <div class="dow">${i===0?t('book:today'):dow}</div>
      <div class="day">${d.getDate()}</div>
      <div class="mo">${mo}</div>
    </div>`);
  }
  cont.innerHTML = items.join('');
}

function toLocalISO(d) {
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

async function selectDate(i) {
  document.querySelectorAll('.date-btn').forEach(el => el.classList.remove('active'));
  const btn = document.querySelector(`.date-btn[data-i="${i}"]`);
  if (btn) btn.classList.add('active');
  const today = new Date(); today.setHours(0,0,0,0);
  selectedDate = new Date(today); selectedDate.setDate(selectedDate.getDate()+i);
  selectedSlotISO = null;
  document.getElementById('slot-date').textContent = '· ' + selectedDate.toLocaleDateString('ru', { day:'numeric', month:'long' });
  await loadBusy();
  renderSlots();
}

async function loadBusy() {
  const from = toLocalISO(selectedDate);
  const end  = new Date(selectedDate); end.setDate(end.getDate()+1);
  const to   = toLocalISO(end);
  const r = await fetch(`/api/public/slots?doctor=${encodeURIComponent(doctorUsername)}&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
  busySlots = r.ok ? await r.json() : [];
}

function isSlotBusy(slotStart, slotDurMin) {
  const s1 = slotStart.getTime();
  const e1 = s1 + slotDurMin*60000;
  return busySlots.some(b => {
    const s2 = new Date(b.start_at.replace(' ','T')).getTime();
    const e2 = s2 + b.duration_min*60000;
    return s1 < e2 && e1 > s2;
  });
}

function renderSlots() {
  const cont = document.getElementById('slots');
  const slots = [];
  const isToday = selectedDate.toDateString() === new Date().toDateString();
  const now = new Date();
  for (let h = HOUR_START; h < HOUR_END; h++) {
    const d = new Date(selectedDate); d.setHours(h, 0, 0, 0);
    const past = isToday && d <= now;
    const busy = isSlotBusy(d, SLOT_DURATION);
    const iso = toLocalISO(d);
    const cls = (busy || past) ? 'taken' : '';
    const onclick = (busy || past) ? '' : `onclick="selectSlot('${iso}', this)"`;
    slots.push(`<div class="slot ${cls}" ${onclick}>${String(h).padStart(2,'0')}:00</div>`);
  }
  cont.innerHTML = slots.join('') || '<div class="slot-empty">'+t('book:noSlots')+'</div>';
}

function selectSlot(iso, el) {
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  selectedSlotISO = iso;
  document.getElementById('err').style.display = 'none';
}

async function submitBooking() {
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('err');
  errEl.style.display = 'none';

  if (!selectedSlotISO) return showErr(t('book:error.selectTime'));
  const patient = document.getElementById('f-patient').value.trim();
  const phone   = document.getElementById('f-phone').value.trim();
  const email   = document.getElementById('f-email').value.trim();
  const reason  = document.getElementById('f-reason').value.trim();
  if (patient.length < 3) return showErr(t('book:error.fullName'));
  if (phone.length < 6)   return showErr(t('book:error.phone'));

  btn.disabled = true; btn.textContent = t('book:error.sending');
  try {
    const r = await fetch('/api/public/book', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        doctor: doctorUsername,
        start_at: selectedSlotISO,
        duration_min: SLOT_DURATION,
        patient, patient_phone: phone, patient_email: email || null,
        reason: reason || null,
        utm_source: utmSource || null,
        utm_medium: utmMedium || null
      })
    });
    const data = await r.json().catch(()=>({}));
    if (!r.ok) { showErr(data.error || t('book:error.failed')); btn.disabled = false; btn.textContent = t('book:form.submit'); return; }
    showSuccess(patient, phone, data.id);
  } catch {
    showErr(t('book:error.network'));
    btn.disabled = false; btn.textContent = t('book:form.submit');
  }
}

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg; el.style.display = 'block';
}

async function showSuccess(patient, phone, apptId) {
  document.getElementById('step-booking').style.display = 'none';
  document.getElementById('step-success').style.display = 'block';
  if (window._acutwinPostBooked) window._acutwinPostBooked();
  const dt = new Date(selectedSlotISO.replace(' ','T'));
  document.getElementById('summary').innerHTML = `
    <div class="summary-row"><span class="lbl">${t('book:summary.doctor')}</span><span>${escHtml(doctorInfo.name)}</span></div>
    ${doctorInfo.clinic ? `<div class="summary-row"><span class="lbl">${t('book:summary.clinic')}</span><span>${escHtml(doctorInfo.clinic.name || doctorInfo.clinic)}</span></div>` : ''}
    <div class="summary-row"><span class="lbl">${t('book:summary.time')}</span><span>${dt.toLocaleDateString('ru',{weekday:'short',day:'numeric',month:'long'})}${t('book:summary.timeAt')}${dt.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}</span></div>
    <div class="summary-row"><span class="lbl">${t('book:summary.patient')}</span><span>${escHtml(patient)}</span></div>
    <div class="summary-row"><span class="lbl">${t('book:summary.contact')}</span><span>${escHtml(phone)}</span></div>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
