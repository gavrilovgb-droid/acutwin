name: Deploy to VPS

# Деплой на боевой сервер.
# ВАЖНО: .env на сервере НЕ трогаем — секреты живут только на сервере.
# git reset --hard приводит /opt/acutwin к состоянию ветки master.
# Сначала тестируем локально, потом push в master → деплой.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 194.67.92.166
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          script: |
            set -e
            cd /opt/acutwin
            git fetch origin master
            git reset --hard origin/master
            npm install --omit=dev --no-audit --no-fund || true
            pm2 restart acutwin
            sleep 3
            curl -fsS http://localhost:5500/api/health || echo "WARN: health check failed"
            echo "Deploy done."
