// ─── Хеширование (идентично auth.js) ────────────────────
async function hashPwd(p) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ─── Генерация записей ───────────────────────────────────
function makeRecords(doctorUsername, doctorName, patientSlice, baseOffset = 0) {
  const records = [];
  const baseDate = new Date('2026-02-01');
  baseDate.setDate(baseDate.getDate() + baseOffset * 3);
  patientSlice.forEach((patient, pi) => {
    const sc = SCENARIOS[pi % SCENARIOS.length];
    for (let v = 0; v < 5; v++) {
      const d = new Date(baseDate);
      d.setDate(d.getDate() + pi * 10 + v * 7);
      records.push({
        id: d.getTime() + pi*1000 + v + Math.random()*100,
        doctor: doctorUsername, doctorName,
        date: d.toISOString().slice(0,10),
        time: `${9 + pi % 5}:${v%2===0?'00':'30'}`,
        patient: patient.n, age: patient.age, gender: patient.g,
        reason: sc.reason, type: 'Акупунктура',
        session: `${v+1}/5`, points: sc.points,
        notes: sc.notes[v], outcome: sc.outcomes[v], duration: 45+v*5,
      });
    }
  });
  return records;
}

// ─── СТАРТ ───────────────────────────────────────────────
(async () => {
  log('▶ Начинаем сидирование...', 'text-cyan-400');

  // 1. Пользователи
  const existingUsers = JSON.parse(localStorage.getItem('acutwin_users') || '[]');
  const existingLogins = new Set(existingUsers.map(u => u.username));
  const newUsers = [...existingUsers];
  let addedUsers = 0;

  for (const t of TENANTS_DEF) {
    for (const d of t.doctors) {
      if (!existingLogins.has(d.login)) {
        const hash = await hashPwd(d.pwd);
        newUsers.push({ name: d.name, username: d.login, hash, role: 'doctor' });
        existingLogins.add(d.login);
        addedUsers++;
      }
    }
  }
  localStorage.setItem('acutwin_users', JSON.stringify(newUsers));
  log(`✓ Создано пользователей: ${addedUsers}`, 'text-green-400');

  // 2. Арендаторы
  const existingTenants = JSON.parse(localStorage.getItem('acutwin_tenants') || '[]');
  const existingNames = new Set(existingTenants.map(t => t.name));
  const newTenants = [...existingTenants];
  let addedTenants = 0;

  for (const td of TENANTS_DEF) {
    if (existingNames.has(td.name)) continue;
    newTenants.push({
      id: uid(),
      name: td.name, type: td.type, plan: td.plan, status: td.status,
      price: td.price, paidUntil: td.paidUntil,
      contact: td.contact, phone: td.phone, email: td.email,
      doctorLogins: td.doctors.map(d => d.login),
      notes: td.note || '',
      payments: td.payments || [],
      createdAt: subDays(Math.floor(Math.random()*60 + 5)),
    });
    addedTenants++;
  }
  localStorage.setItem('acutwin_tenants', JSON.stringify(newTenants));
  log(`✓ Создано арендаторов: ${addedTenants}`, 'text-green-400');

  // 3. Записи приёмов (10 пациентов × 5 сеансов на каждого врача)
  const existingRecs = JSON.parse(localStorage.getItem('acutwin_records') || '[]');
  const existingDoctors = new Set(existingRecs.map(r => r.doctor));
  let allNewRecs = [...existingRecs];
  let addedDoctors = 0;

  let patientOffset = 0;
  for (const td of TENANTS_DEF) {
    for (const d of td.doctors) {
      if (existingDoctors.has(d.login)) continue;
      const slice = PATIENT_POOL.slice(patientOffset % PATIENT_POOL.length,
                                       (patientOffset % PATIENT_POOL.length) + 10);
      // Если не хватает до конца массива — добиваем с начала
      const patients = slice.length === 10 ? slice :
        [...slice, ...PATIENT_POOL.slice(0, 10 - slice.length)];
      const recs = makeRecords(d.login, d.name, patients, patientOffset);
      allNewRecs.push(...recs);
      patientOffset++;
      addedDoctors++;
      log(`  · ${d.name} (${d.login}): 10 пациентов × 5 сеансов = 50 записей`, 'text-gray-400');
    }
  }

  // Сортируем по дате убыванию
  allNewRecs.sort((a,b) => b.id - a.id);
  localStorage.setItem('acutwin_records', JSON.stringify(allNewRecs));
  log(`✓ Добавлено врачей с записями: ${addedDoctors} (${addedDoctors * 50} записей)`, 'text-green-400');
  log('', '');
  log(`📊 Итого в базе: ${newTenants.length} арендаторов, ${newUsers.length} пользователей, ${allNewRecs.length} записей`, 'text-cyan-400');

  document.getElementById('done').classList.remove('hidden');
})();
