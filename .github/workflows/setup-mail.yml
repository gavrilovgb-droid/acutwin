name: Setup Mail Forwarding

on:
  workflow_dispatch:

jobs:
  mail:
    runs-on: ubuntu-latest
    steps:
      - name: Add MX record via REG.RU web
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 194.67.92.166
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          script: |
            python3 - << 'PYEOF'
            import urllib.request, urllib.parse, urllib.error, json, re, http.cookiejar

            USER = "ggbksi"
            PASS = "Elena196672!@"
            DOMAIN = "acutwin.ru"
            VPS_IP = "194.67.92.166"

            jar = http.cookiejar.CookieJar()
            opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(jar))
            opener.addheaders = [('User-Agent', 'Mozilla/5.0')]

            # 1. Получаем страницу логина
            resp = opener.open("https://www.reg.ru/user/login/")
            html = resp.read().decode("utf-8")
            token = re.search(r'name="csrf_token"\s+value="([^"]+)"', html)
            csrf = token.group(1) if token else ""
            print("CSRF:", csrf[:20] if csrf else "not found")

            # 2. Логинимся
            data = urllib.parse.urlencode({
                "login": USER, "password": PASS,
                "csrf_token": csrf, "action": "login"
            }).encode()
            resp = opener.open("https://www.reg.ru/user/login/", data)
            body = resp.read().decode("utf-8")
            logged_in = "logout" in body.lower() or "выход" in body.lower() or "lk" in resp.url
            print("Logged in:", logged_in, "URL:", resp.url[:60])

            # 3. Получаем список DNS-записей домена
            resp = opener.open(f"https://www.reg.ru/domain/new/service_list/?zone_name={DOMAIN}")
            body = resp.read().decode("utf-8")
            print("Domain page:", resp.url[:80])
            print("Page snippet:", body[2000:2200])

            # 4. Пробуем найти endpoint для добавления DNS
            # REG.RU использует /api/ endpoint для DNS
            dns_url = f"https://www.reg.ru/domain/new/ajax/?action=get_dns_records&zone_name={DOMAIN}"
            resp = opener.open(dns_url)
            print("DNS API:", resp.read().decode("utf-8")[:300])

            PYEOF
