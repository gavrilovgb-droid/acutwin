<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1,viewport-fit=cover" name="viewport"/>
<title>AcuTwin — Billing</title>
<link rel="stylesheet" href="tailwind.css?v=2">
<link href="fonts.css?v=2" rel="stylesheet"/>
<link href="design.css?v=3" rel="stylesheet"/>
<meta name="theme-color" content="#131313">
<style>
.plan-demo    { background:rgba(10,132,255,.12); color:#0A84FF; border:1px solid rgba(10,132,255,.35); }
.plan-trial   { background:rgba(255,214,10,.12); color:#FFD60A; border:1px solid rgba(255,214,10,.35); }
.plan-grace   { background:rgba(255,159,10,.12); color:#ff9f0a; border:1px solid rgba(255,159,10,.35); }
.plan-expired { background:rgba(255,69,58,.12);  color:#FF453A; border:1px solid rgba(255,69,58,.35); }
.plan-paid    { background:rgba(52,199,89,.12);  color:#34C759; border:1px solid rgba(52,199,89,.35); }
.row-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:12px; transition:background .15s; }
.row-card:hover { background:rgba(255,255,255,0.06); }
.glass-input { background:#1f1f1f; border:1px solid #414755; border-radius:8px; padding:6px 10px; color:#e2e2e2; font-size:.8rem; outline:none; transition:border-color .15s; }
.glass-input:focus { border-color:rgba(0,132,255,.5); }
select.glass-input option { background:#1f1f1f; }
.badge { display:inline-flex; align-items:center; gap:4px; padding:2px 10px; border-radius:20px; font-size:.65rem; font-weight:700; white-space:nowrap; }
.btn-sm { display:inline-flex; align-items:center; gap:4px; padding:5px 10px; border-radius:8px; font-size:.72rem; font-weight:600; cursor:pointer; border:none; transition:opacity .15s; }
.btn-sm:hover { opacity:.8; }
</style>
</head>
<body class="bg-[#131313] text-[#e2e2e2] min-h-screen" style="font-family:'Inter',sans-serif">

<div id="nav-mount"></div>

<div class="md:ml-64 flex flex-col min-h-screen">
  <header class="sticky top-0 z-30 border-b border-white/10 bg-[#131313]/95 backdrop-blur-xl px-6 py-3 flex items-center gap-4">
    <h1 class="text-sm font-bold text-[#e2e2e2]">Admin Billing Dashboard</h1>
    <div class="ml-auto flex items-center gap-2">
      <select id="filter-status" class="glass-input" style="width:160px" onchange="renderTable()">
        <option value="">Все статусы</option>
        <option value="demo">Demo</option>
        <option value="trial_active">Trial активный</option>
        <option value="trial_grace">Trial grace</option>
        <option value="trial_expired">Trial истёк</option>
        <option value="paid">Paid</option>
      </select>
      <div id="counts-bar" class="text-xs text-[#8b90a0]"></div>
    </div>
  </header>

  <main class="flex-1 p-6 space-y-4">
    <!-- Stat cards -->
    <div id="stat-cards" class="grid grid-cols-2 md:grid-cols-5 gap-3"></div>

    <!-- Table -->
    <div id="tenant-list" class="space-y-2"></div>

    <!-- Audit Log -->
    <div class="mt-6">
      <div class="flex items-center gap-3 mb-3">
        <h2 class="text-sm font-bold text-[#e2e2e2]">Audit Log</h2>
        <select id="audit-tenant-filter" class="glass-input" style="width:220px" onchange="loadAudit()">
          <option value="">Все тенанты</option>
        </select>
        <button onclick="loadAudit()" class="btn-sm" style="background:rgba(255,255,255,.06);color:#8b90a0">↻ Обновить</button>
        <span id="audit-count" class="text-xs text-[#8b90a0]"></span>
      </div>
      <div class="row-card overflow-x-auto">
        <table class="w-full text-xs" style="border-collapse:collapse">
          <thead>
            <tr style="border-bottom:1px solid rgba(255,255,255,.08)">
              <th class="text-left px-3 py-2 text-[#8b90a0] font-semibold" style="min-width:140px">Время (UTC)</th>
              <th class="text-left px-3 py-2 text-[#8b90a0] font-semibold">Актор</th>
              <th class="text-left px-3 py-2 text-[#8b90a0] font-semibold">Действие</th>
              <th class="text-left px-3 py-2 text-[#8b90a0] font-semibold">Тенант</th>
              <th class="text-left px-3 py-2 text-[#8b90a0] font-semibold">Детали</th>
            </tr>
          </thead>
          <tbody id="audit-tbody">
            <tr><td colspan="5" class="px-3 py-4 text-[#8b90a0] text-center">Загрузка…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Action panel (slide-in from right) -->
<div id="action-panel" class="hidden fixed inset-y-0 right-0 z-50 w-80 flex flex-col" style="background:#1a1a1a;border-left:1px solid rgba(255,255,255,.1)">
  <div class="flex items-center justify-between px-5 py-4 border-b border-white/10">
    <div>
      <div id="ap-name" class="font-bold text-sm"></div>
      <div id="ap-plan-badge" class="mt-1"></div>
    </div>
    <button onclick="closePanel()" class="text-[#8b90a0] hover:text-white text-xl leading-none">×</button>
  </div>
  <div class="flex-1 overflow-y-auto p-5 space-y-5">

    <!-- Trial info -->
    <div id="ap-trial-info" class="text-xs text-[#8b90a0] space-y-1"></div>

    <!-- Activate trial -->
    <div>
      <div class="text-xs font-bold text-[#8b90a0] mb-2 uppercase tracking-wider">Активировать trial</div>
      <div class="flex gap-2 flex-wrap">
        <button onclick="doAction('activate_trial',1)" class="btn-sm" style="background:rgba(255,214,10,.12);color:#FFD60A">1 нед</button>
        <button onclick="doAction('activate_trial',2)" class="btn-sm" style="background:rgba(255,214,10,.12);color:#FFD60A">2 нед</button>
        <button onclick="doAction('activate_trial',3)" class="btn-sm" style="background:rgba(255,214,10,.12);color:#FFD60A">3 нед</button>
        <button onclick="doAction('activate_trial',4)" class="btn-sm" style="background:rgba(255,214,10,.12);color:#FFD60A">4 нед</button>
      </div>
    </div>

    <!-- Extend trial -->
    <div>
      <div class="text-xs font-bold text-[#8b90a0] mb-2 uppercase tracking-wider">Продлить trial</div>
      <div class="flex gap-2 flex-wrap">
        <button onclick="doAction('extend_trial',1)" class="btn-sm" style="background:rgba(255,159,10,.12);color:#ff9f0a">+1 нед</button>
        <button onclick="doAction('extend_trial',2)" class="btn-sm" style="background:rgba(255,159,10,.12);color:#ff9f0a">+2 нед</button>
        <button onclick="doAction('extend_trial',3)" class="btn-sm" style="background:rgba(255,159,10,.12);color:#ff9f0a">+3 нед</button>
        <button onclick="doAction('extend_trial',4)" class="btn-sm" style="background:rgba(255,159,10,.12);color:#ff9f0a">+4 нед</button>
      </div>
    </div>

    <!-- Set plan -->
    <div>
      <div class="text-xs font-bold text-[#8b90a0] mb-2 uppercase tracking-wider">Сменить тариф</div>
      <div class="flex gap-2 flex-wrap">
        <button onclick="setPlan('demo')"      class="btn-sm" style="background:rgba(10,132,255,.12);color:#0A84FF">Demo</button>
        <button onclick="setPlan('practik')"   class="btn-sm" style="background:rgba(52,199,89,.12);color:#34C759">Practik</button>
        <button onclick="setPlan('clinic_s')"  class="btn-sm" style="background:rgba(52,199,89,.12);color:#34C759">Clinic S</button>
        <button onclick="setPlan('clinic_m')"  class="btn-sm" style="background:rgba(52,199,89,.12);color:#34C759">Clinic M</button>
        <button onclick="setPlan('clinic_pro')"class="btn-sm" style="background:rgba(191,90,242,.12);color:#BF5AF2">Clinic Pro</button>
      </div>
    </div>
    <div id="ap-feedback" class="text-xs font-bold" style="min-height:18px"></div>
  </div>
</div>
<div id="panel-backdrop" class="hidden fixed inset-0 z-40" onclick="closePanel()"></div>

<script type="module">
import { buildSidebar } from './shared.js';
import { requireAuth }  from './auth.js';
import { apiBillingTenants, apiBillingAction, apiBillingAudit } from './api.js';

const session = await requireAuth();
if (!session || (session.role !== 'admin' && session.role !== 'boss')) {
  window.location.href = 'index.html'; throw new Error('redirect');
}
document.getElementById('nav-mount').innerHTML = buildSidebar('billing', session);

let _tenants = [];
let _selected = null;

const PLAN_LABELS = {
  demo:'Demo', trial:'Trial', practik:'Practik',
  clinic_s:'Clinic S', clinic_m:'Clinic M', clinic_pro:'Clinic Pro',
  trial_grace:'Trial Grace', trial_expired:'Trial Expired',
};

function planBadgeClass(status) {
  if (status === 'demo') return 'plan-demo';
  if (status === 'trial_active') return 'plan-trial';
  if (status === 'trial_grace') return 'plan-grace';
  if (status === 'trial_expired') return 'plan-expired';
  if (status === 'paid') return 'plan-paid';
  return 'plan-demo';
}

function planLabel(t) {
  const s = t.trialStatus?.status || 'demo';
  if (s === 'trial_active') return 'Trial';
  if (s === 'trial_grace') return 'Trial Grace';
  if (s === 'trial_expired') return 'Trial Expired';
  if (s === 'paid') return PLAN_LABELS[t.plan] || t.plan;
  return PLAN_LABELS[t.plan] || t.plan;
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function paidUntilLabel(t) {
  const s = t.trialStatus?.status;
  if (s === 'trial_active' || s === 'trial_grace' || s === 'trial_expired') {
    return t.trial_end ? formatDate(t.trial_end.replace(' ', 'T') + 'Z') : '—';
  }
  if (s === 'paid') return t.paidUntil ? formatDate(t.paidUntil) : '—';
  return '—';
}

function daysLeftLabel(t) {
  const dl = t.trialStatus?.daysLeft;
  if (dl == null) return '';
  if (dl === 0) return '<span style="color:#FF453A">0 дн.</span>';
  if (dl <= 3) return `<span style="color:#ff9f0a">${dl} дн.</span>`;
  return `<span style="color:#34C759">${dl} дн.</span>`;
}

window.renderTable = function() {
  const filter = document.getElementById('filter-status').value;
  const list = document.getElementById('tenant-list');
  const visible = filter
    ? _tenants.filter(t => t.trialStatus?.status === filter)
    : _tenants;

  list.innerHTML = visible.length === 0
    ? '<div class="text-center text-[#8b90a0] text-sm py-12">Нет данных</div>'
    : visible.map(t => {
      const st = t.trialStatus?.status || 'demo';
      const cls = planBadgeClass(st);
      return `
      <div class="row-card p-4 flex flex-wrap items-center gap-3 cursor-pointer" onclick="openPanel('${t.id}')">
        <div class="flex-1 min-w-0">
          <div class="font-bold text-sm truncate">${t.clinic}</div>
          <div class="text-xs text-[#8b90a0] truncate">${(t.doctorLogins||[]).join(', ') || '—'}</div>
        </div>
        <span class="badge ${cls}">${planLabel(t)}</span>
        <div class="text-xs text-[#8b90a0] w-24 text-right">
          <div>до: ${paidUntilLabel(t)}</div>
          <div>${daysLeftLabel(t)}</div>
        </div>
      </div>`;
    }).join('');

  document.getElementById('counts-bar').textContent = `${visible.length} из ${_tenants.length}`;
};

function renderStatCards() {
  const cnt = s => _tenants.filter(t => t.trialStatus?.status === s).length;
  const cards = [
    { label:'Demo',          val: cnt('demo'),         color:'#0A84FF' },
    { label:'Trial активн.', val: cnt('trial_active'), color:'#FFD60A' },
    { label:'Grace 24h',     val: cnt('trial_grace'),  color:'#ff9f0a' },
    { label:'Trial истёк',   val: cnt('trial_expired'),color:'#FF453A' },
    { label:'Paid',          val: cnt('paid'),          color:'#34C759' },
  ];
  document.getElementById('stat-cards').innerHTML = cards.map(c => `
    <div class="rounded-xl p-4" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)">
      <div class="text-2xl font-bold" style="color:${c.color}">${c.val}</div>
      <div class="text-xs text-[#8b90a0] mt-1">${c.label}</div>
    </div>`).join('');
}

window.openPanel = function(id) {
  _selected = _tenants.find(t => t.id === id);
  if (!_selected) return;
  const s = _selected.trialStatus?.status || 'demo';
  document.getElementById('ap-name').textContent = _selected.clinic;
  document.getElementById('ap-plan-badge').innerHTML = `<span class="badge ${planBadgeClass(s)}">${planLabel(_selected)}</span>`;
  const te = _selected.trial_end;
  document.getElementById('ap-trial-info').innerHTML = [
    te ? `<div>trial_end: <b>${formatDate(te.replace(' ','T')+'Z')}</b></div>` : '',
    _selected.trial_weeks ? `<div>Недель: ${_selected.trial_weeks}</div>` : '',
    _selected.trialStatus?.daysLeft != null ? `<div>Дней осталось: ${_selected.trialStatus.daysLeft}</div>` : '',
    _selected.paidUntil ? `<div>Оплачен до: ${formatDate(_selected.paidUntil)}</div>` : '',
  ].filter(Boolean).join('') || '<div>Нет данных trial</div>';
  document.getElementById('ap-feedback').textContent = '';
  document.getElementById('action-panel').classList.remove('hidden');
  document.getElementById('panel-backdrop').classList.remove('hidden');
};

window.closePanel = function() {
  document.getElementById('action-panel').classList.add('hidden');
  document.getElementById('panel-backdrop').classList.add('hidden');
};

window.doAction = async function(action, weeks) {
  if (!_selected) return;
  const fb = document.getElementById('ap-feedback');
  fb.style.color = '#8b90a0'; fb.textContent = 'Сохраняю…';
  const r = await apiBillingAction(_selected.id, action, { weeks });
  if (r?.ok) {
    fb.style.color = '#34C759';
    fb.textContent = action === 'extend_trial'
      ? `Продлено до ${formatDate(r.trialEnd?.replace(' ','T')+'Z')}`
      : `Trial активирован до ${formatDate(r.trialEnd?.replace(' ','T')+'Z')}`;
    await reload();
    openPanel(_selected.id);
  } else {
    fb.style.color = '#FF453A'; fb.textContent = r?.error || 'Ошибка';
  }
};

window.setPlan = async function(plan) {
  if (!_selected) return;
  const fb = document.getElementById('ap-feedback');
  fb.style.color = '#8b90a0'; fb.textContent = 'Сохраняю…';
  const r = await apiBillingAction(_selected.id, 'set_plan', { plan });
  if (r?.ok) {
    fb.style.color = '#34C759'; fb.textContent = `Тариф → ${PLAN_LABELS[plan] || plan}`;
    await reload();
    openPanel(_selected.id);
  } else {
    fb.style.color = '#FF453A'; fb.textContent = r?.error || 'Ошибка';
  }
};

const ACTION_LABELS = {
  activate_trial: 'Активировать trial',
  extend_trial:   'Продлить trial',
  set_plan:       'Сменить тариф',
};

window.loadAudit = async function() {
  const sel   = document.getElementById('audit-tenant-filter');
  const tbody = document.getElementById('audit-tbody');
  const cnt   = document.getElementById('audit-count');
  tbody.innerHTML = '<tr><td colspan="5" class="px-3 py-4 text-[#8b90a0] text-center">Загрузка…</td></tr>';
  const rows = await apiBillingAudit(sel.value || null);
  cnt.textContent = rows.length ? `${rows.length} записей` : '';
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="px-3 py-4 text-[#8b90a0] text-center">Нет записей</td></tr>';
    return;
  }
  const tenantMap = Object.fromEntries(_tenants.map(t => [t.id, t.clinic]));
  tbody.innerHTML = rows.map(r => {
    let meta = '';
    try { const m = JSON.parse(r.meta || 'null'); if (m) meta = Object.entries(m).map(([k,v])=>`${k}: ${v}`).join(' · '); } catch {}
    const actionLabel = ACTION_LABELS[r.action] || r.action;
    const tenantName  = tenantMap[r.tenant_id] || r.tenant_id;
    return `<tr style="border-bottom:1px solid rgba(255,255,255,.05)">
      <td class="px-3 py-2 text-[#8b90a0] whitespace-nowrap">${r.created_at.replace('T',' ').replace('Z','')}</td>
      <td class="px-3 py-2 font-mono" style="color:#0A84FF">${r.actor}</td>
      <td class="px-3 py-2 font-semibold" style="color:#FFD60A">${actionLabel}</td>
      <td class="px-3 py-2 text-[#e2e2e2]" title="${r.tenant_id}">${tenantName}</td>
      <td class="px-3 py-2 text-[#8b90a0]">${meta}</td>
    </tr>`;
  }).join('');
};

function populateAuditFilter() {
  const sel = document.getElementById('audit-tenant-filter');
  _tenants.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id; opt.textContent = t.clinic;
    sel.appendChild(opt);
  });
}

async function reload() {
  _tenants = await apiBillingTenants();
  renderStatCards();
  renderTable();
}

await reload();
populateAuditFilter();
await loadAudit();
</script>
</body>
</html>
