<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1,viewport-fit=cover" name="viewport"/>
<title>AcuTwin — Атлас точек</title>
<link rel="stylesheet" href="tailwind.css?v=2">
<link href="fonts.css?v=2" rel="stylesheet"/>
<link href="design.css?v=3" rel="stylesheet"/>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#131313">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
#body-bg {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  left: 16rem;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.md\:ml-64 > header, .md\:ml-64 > * { position: relative; z-index: 1; }
</style>
</head>
<body class="bg-[#131313] text-[#e2e2e2] h-screen overflow-hidden" style="font-family:'Inter',sans-serif">

<div id="nav-mount"></div>

<!-- Body background -->
<div id="body-bg"></div>

<div class="md:ml-64 h-screen flex flex-col">

  <!-- Top bar -->
  <header class="sticky top-0 z-40 bg-[rgba(255,255,255,0.06)] backdrop-blur-xl border-b border-white/10 h-16 flex items-center gap-4 px-6 flex-shrink-0">
    <h2 class="text-lg font-bold" style="font-family:'Hanken Grotesk',sans-serif">Атлас точек</h2>
    <div class="ml-auto flex items-center gap-3">
      <span id="pt-count" class="text-xs text-[#8b90a0] font-mono"></span>
      <div class="relative group">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#8b90a0] text-base group-focus-within:text-[#00F2FF] transition-colors">search</span>
        <input id="atlas-search"
               class="pl-9 pr-4 py-1.5 w-64 bg-[#1f1f1f] border border-[#414755] rounded-full text-xs text-[#e2e2e2] placeholder-[#8b90a0] focus:outline-none focus:border-[#00F2FF] focus:ring-1 focus:ring-[#00F2FF]/30 transition-all"
               placeholder="Поиск точки (код, название)..."/>
      </div>
    </div>
  </header>

  <!-- Mobile atlas filter bar (sections + meridians) -->
  <div id="mob-atlas-nav" style="display:none;flex-direction:column;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.1);background:rgba(14,14,14,0.97);position:sticky;top:64px;z-index:30"></div>

  <!-- Hidden elements kept for JS compatibility -->
  <div id="section-tabs" class="hidden"></div>
  <div id="mer-tabs" class="hidden"></div>

  <!-- Main: two-panel layout (catalog) -->
  <div id="panel-catalog" class="flex-1 flex overflow-hidden">

    <!-- Left: Point list -->
    <div class="w-80 flex-shrink-0 border-r border-white/10 flex flex-col overflow-hidden">
      <div id="point-list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
    </div>

    <!-- Right: Point detail -->
    <div class="flex-1 overflow-y-auto">
      <div id="point-detail" class="min-h-full flex items-center justify-center text-[#8b90a0] text-sm">
        <div class="text-center">
          <span class="material-symbols-outlined text-5xl text-[#414755] mb-3 block">adjust</span>
          Выберите точку из списка
        </div>
      </div>
    </div>

  </div>

  <!-- Static section panel (standard/pain/emergency/dangerous) -->
  <div id="panel-static" class="hidden flex-1 overflow-y-auto p-6">
    <div id="static-content" class="max-w-4xl mx-auto"></div>
  </div>

  <!-- Meridian overview page (BUG-008) -->
  <div id="panel-meridian" class="hidden flex-1 overflow-y-auto p-6">
    <div id="meridian-content" class="max-w-4xl mx-auto"></div>
  </div>
</div>

<!-- Video modal -->
<div id="vid-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm"
     onclick="if(event.target===this) closeVidModal()">
  <div class="glass-panel rounded-2xl p-5 w-full max-w-lg mx-4 border border-white/20">
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-2">
        <span id="vm-code" class="font-bold text-lg text-[#00F2FF]"></span>
        <span id="vm-name" class="text-sm text-[#8b90a0]"></span>
      </div>
      <button onclick="closeVidModal()" class="text-[#8b90a0] hover:text-white transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <video id="vm-video" controls class="w-full rounded-xl mb-3 bg-black"
           controlsList="nodownload noremoteplayback" disablePictureInPicture
           oncontextmenu="return false"></video>
    <div id="vm-info" class="text-xs text-[#8b90a0] leading-relaxed"></div>
  </div>
</div>

<script type="module">
import { buildSidebar, initElementClock, MER_ORDER, MERIDIANS, MER_SIGNS, ptVideoSrc, merVideoSrc, esc, displayCode } from './shared.js';
import { requireAuth } from './auth.js';
import { getToken } from './api.js';
const session = await requireAuth(); if (!session) throw new Error('redirect');

document.getElementById('nav-mount').innerHTML = buildSidebar('atlas', session);
initElementClock();

const SPECIAL = [
  {key:'standard',  icon:'star',      label:'Стандартные точки', color:'#FFD60A'},
  {key:'pain',      icon:'healing',   label:'Противоболевые',    color:'#00F2FF'},
  {key:'emergency', icon:'emergency', label:'Скорая помощь',     color:'#ffb4ab'},
  {key:'dangerous', icon:'warning',   label:'Опасные точки',     color:'#FF9500'},
];

const ALL_MERS = [
  {key:'P',  label:'P',  name:'Лёгкие',           color:'#5a8fa8'},
  {key:'Gi', label:'GI', name:'Толст. кишечник',   color:'#5a8fa8'},
  {key:'E',  label:'E',  name:'Желудок',            color:'#c07840'},
  {key:'RP', label:'RP', name:'Селезёнка',          color:'#c07840'},
  {key:'C',  label:'C',  name:'Сердце',             color:'#c0392b'},
  {key:'iG', label:'IG', name:'Тонк. кишечник',    color:'#c0392b'},
  {key:'V',  label:'V',  name:'Моч. пузырь',       color:'#2471a3'},
  {key:'R',  label:'R',  name:'Почки',              color:'#2471a3'},
  {key:'MC', label:'MC', name:'Перикард',           color:'#a0305a'},
  {key:'TR', label:'TR', name:'Тр. обогреватель',   color:'#a0305a'},
  {key:'VB', label:'VB', name:'Желчн. пузырь',     color:'#3d8a5c'},
  {key:'F',  label:'F',  name:'Печень',             color:'#3d8a5c'},
  {key:'T',  label:'VG', name:'Задне-Средин.',      color:'#8b6db5'},
  {key:'J',  label:'VC', name:'Пере.-Средин.',      color:'#8b6db5'},
];

// Inject atlas sub-nav
(function() {
  const atlasLink = document.querySelector('#nav-mount a[href="atlas.html"]');
  if (!atlasLink) return;
  window._atlasOpen = false;
  atlasLink.addEventListener('click', e => {
    e.preventDefault();
    const sub = document.getElementById('sidebar-atlas');
    window._atlasOpen = !window._atlasOpen;
    if (sub) sub.style.display = window._atlasOpen ? 'flex' : 'none';
    if (window._atlasOpen && window.setMer) window.setMer('all');
  });

  const sub = document.createElement('div');
  sub.id = 'sidebar-atlas';
  sub.style.cssText = 'padding:2px 8px 4px 8px;display:none;flex-direction:column;gap:1px';
  sub.innerHTML = `
    <div class="px-3 py-1 text-[10px] font-bold uppercase tracking-widest text-white">Меридианы</div>
    ${ALL_MERS.map(m => `
      <button onclick="setMer('${m.key}')" data-mer="${m.key}"
        class="atlas-mer-btn flex items-center gap-2 pl-6 pr-3 py-1.5 rounded-lg text-xs font-medium w-full text-left transition-all text-[#8b90a0] hover:bg-white/15 hover:text-[#c1c6d7]">
        <span style="width:7px;height:7px;border-radius:50%;background:${m.color};flex-shrink:0;display:inline-block"></span>
        <span class="font-bold w-7" style="color:${m.color}">${m.label}</span>
        <span class="truncate" style="color:#c1c6d7">${m.name}</span>
      </button>`).join('')}
    <div class="px-3 py-1 mt-1 text-[10px] font-bold uppercase tracking-widest text-white">Специальные точки</div>
    ${SPECIAL.map(s => `
      <button onclick="setSection('${s.key}')" data-sec="${s.key}"
        class="atlas-sec-btn flex items-center gap-2.5 pl-6 pr-3 py-2 rounded-lg text-xs font-medium w-full text-left transition-all text-[#c1c6d7] hover:bg-white/15 hover:text-white">
        <span class="material-symbols-outlined flex-shrink-0" style="font-size:16px;color:${s.color}">${s.icon}</span>
        <span>${s.label}</span>
      </button>`).join('')}
  `;
  atlasLink.insertAdjacentElement('afterend', sub);
})();

let points = {};
let allCodes = [];
let activeMer = 'all';
let activeCode = null;

// Check URL params
const params = new URLSearchParams(location.search);
const initCode = params.get('code');
const initMer  = params.get('mer');

fetch('/data/points.json', { headers: { Authorization: 'Bearer ' + getToken() } })
  .then(r => r.json())
  .then(data => {
    points = data;
    allCodes = Object.keys(data).sort((a,b) => {
      const ma = a.match(/^([A-Za-z]+)(\d+)$/);
      const mb = b.match(/^([A-Za-z]+)(\d+)$/);
      if (!ma||!mb) return a.localeCompare(b);
      const FULL_ORDER = [...MER_ORDER, 'T', 'J'];
      if (ma[1]!==mb[1]) return FULL_ORDER.indexOf(ma[1]) - FULL_ORDER.indexOf(mb[1]);
      return parseInt(ma[2]) - parseInt(mb[2]);
    });
    document.getElementById('pt-count').textContent = `${allCodes.length} точек`;
    buildMerTabs();
    buildMobAtlasNav();
    if (initMer) setMer(initMer); else renderList();
    if (initCode && points[initCode]) setTimeout(() => selectPoint(initCode), 100);
    // Auto-open sidebar tree on page load
    const sub = document.getElementById('sidebar-atlas');
    if (sub) sub.style.display = 'flex';
    window._atlasOpen = true;
  })
  .catch(() => {
    document.getElementById('point-list').innerHTML =
      '<div class="p-4 text-sm text-[#8b90a0]">Ошибка загрузки данных</div>';
  });

function buildMerTabs() {
  const tabs = document.getElementById('mer-tabs');

  // Paired Zang (Yin) / Fu (Yang) by element
  const PAIRS = [
    ['P',  'Gi'],  // Металл: Лёгкие / Толстый кишечник
    ['C',  'iG'],  // Огонь:  Сердце / Тонкий кишечник
    ['MC', 'TR'],  // Огонь:  Перикард / Тройной обогреватель
    ['RP', 'E'],   // Земля:  Селезёнка / Желудок
    ['R',  'V'],   // Вода:   Почки / Мочевой пузырь
    ['F',  'VB'],  // Дерево: Печень / Желчный пузырь
  ];
  const EXTRA = ['T', 'J'];

  // VG/VC as 7th pair column
  const ALL_PAIRS = [...PAIRS, ['T', 'J']];

  const SHORT = {
    P:  'Лёгкие',      Gi: 'Толст. киш.',
    C:  'Сердце',      iG: 'Тонк. киш.',
    MC: 'Перикард',    TR: 'Тр. обогрев.',
    RP: 'Селезёнка',   E:  'Желудок',
    R:  'Почки',       V:  'Моч. пузырь',
    F:  'Печень',      VB: 'Желчн. пуз.',
    T:  'Задне-Средин.',  J: 'Пере.-Средин.',
  };

  const tabBtn = (m) => {
    const info = MERIDIANS[m];
    const label = info.display || m;
    const color = info.color || '#8b90a0';
    const isActive = activeMer === m;
    const activeStyle = `background:${color}22;border-color:${color}55;color:${color}`;
    return `<button onclick="setMer('${m}')" id="tab_${m}"
      class="rounded transition-all border text-center w-full"
      style="padding:3px 4px;${isActive ? activeStyle : 'border-color:transparent;color:#8b90a0'}">
      <div style="font-size:11px;font-weight:700;line-height:1.2">${label}</div>
      <div style="font-size:9px;line-height:1.2;opacity:0.7;white-space:nowrap">${SHORT[m] || info.name}</div>
    </button>`;
  };

  tabs.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(${ALL_PAIRS.length},1fr);gap:2px;width:100%">
      ${ALL_PAIRS.map(([z]) => tabBtn(z)).join('')}
      ${ALL_PAIRS.map(([,f]) => tabBtn(f)).join('')}
    </div>`;
}

function buildMobAtlasNav() {
  const nav = document.getElementById('mob-atlas-nav');
  if (!nav) return;
  nav.innerHTML = `
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding:6px 8px 0;display:flex;gap:6px;scrollbar-width:none">
      <button id="mob-sec-catalog" onclick="setSection('catalog')" class="mob-atlas-chip" data-color="#00F2FF">
        <span class="material-symbols-outlined" style="font-size:14px">category</span>Каталог
      </button>
      ${SPECIAL.map(s => `
        <button id="mob-sec-${s.key}" onclick="setSection('${s.key}')" class="mob-atlas-chip" data-color="${s.color}">
          <span class="material-symbols-outlined" style="font-size:14px;color:${s.color}">${s.icon}</span>${s.label}
        </button>`).join('')}
    </div>
    <div id="mob-mer-row" style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 8px 8px;display:flex;gap:4px;scrollbar-width:none">
      <button id="mob-mer-all" onclick="setMer('all')" class="mob-mer-chip" data-mer="all" data-color="#00F2FF">Все</button>
      ${ALL_MERS.map(m => `
        <button id="mob-mer-${m.key}" onclick="setMer('${m.key}')" class="mob-mer-chip" data-mer="${m.key}" data-color="${m.color}">${m.label}</button>`).join('')}
    </div>`;
  updateMobAtlasNav();
}

function updateMobAtlasNav() {
  document.querySelectorAll('.mob-atlas-chip').forEach(b => {
    const secKey = b.id.replace('mob-sec-', '');
    const isA = secKey === activeSection;
    const color = b.dataset.color || '#00F2FF';
    b.style.background = isA ? color + '25' : '';
    b.style.borderColor = isA ? color + '55' : '';
    b.style.color       = isA ? color : '';
  });
  const merRow = document.getElementById('mob-mer-row');
  if (merRow) merRow.style.display = activeSection === 'catalog' ? 'flex' : 'none';
  document.querySelectorAll('.mob-mer-chip').forEach(b => {
    const isA = b.dataset.mer === activeMer;
    const color = b.dataset.color || '#00F2FF';
    b.style.background = isA ? color + '25' : '';
    b.style.borderColor = isA ? color + '55' : '';
    b.style.color       = isA ? color : '';
  });
}

function updateAtlasSidebar() {
  document.querySelectorAll('.atlas-mer-btn').forEach(b => {
    const isA = b.dataset.mer === activeMer;
    const color = b.querySelector('span[style*="border-radius:50%"]')?.style.background || '#8b90a0';
    b.style.background = isA ? `${color}20` : '';
    b.style.color = isA ? color : '';
  });
  document.querySelectorAll('.atlas-sec-btn').forEach(b => {
    const isA = activeSection !== 'catalog' && b.dataset.sec === activeSection;
    const spec = SPECIAL.find(s => s.key === b.dataset.sec);
    const c = spec?.color || '#8b90a0';
    b.style.color = isA ? '#ffffff' : '';
    b.style.background = isA ? `${c}22` : '';
    b.style.borderLeft = isA ? `2px solid ${c}` : '2px solid transparent';
    const icon = b.querySelector('.material-symbols-outlined');
    if (icon) icon.style.color = c; // всегда цветная
  });
}

function buildMeridianPage(mer) {
  const merInfo = MERIDIANS[mer] || {};
  const color = merInfo.color || '#8b90a0';
  const label = merInfo.display || mer;
  const merCodes = allCodes.filter(code => { const m = code.match(/^([A-Za-z]+)/); return m && m[1] === mer; });
  const merVid = merVideoSrc(mer);
  const signs = MER_SIGNS[mer];

  const badge = (s, c) =>
    `<span style="display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;background:${c}18;border:1px solid ${c}40;color:${c};margin:2px 1px">${esc(s)}</span>`;

  const ptCard = (code) => {
    const pt = points[code] || {};
    return `
      <button onclick="openPointFromMeridian('${code}')"
        class="glass-panel rounded-xl p-4 text-left transition-all border border-white/10 hover:bg-white/5 w-full"
        style="hover:border-color:${color}44">
        <div class="flex items-center gap-2 mb-2">
          <span class="font-bold text-sm mer-code" style="color:${color}">${esc(code)}</span>
          ${pt.cn_name ? `<span class="text-xs text-[#8b90a0] truncate">${esc(pt.cn_name)}</span>` : ''}
        </div>
        ${pt.location ? `<p class="text-xs text-[#c1c6d7] mb-2" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(pt.location)}</p>` : ''}
        ${pt.indica ? `<p class="text-[11px] text-[#8b90a0]" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(pt.indica)}</p>` : ''}
      </button>`;
  };

  return `
    <div class="page-enter">
      <div class="glass-panel rounded-2xl p-6 mb-5" style="border-color:${color}33;box-shadow:0 0 30px ${color}18">
        <div class="flex items-start gap-4 mb-4">
          <div style="width:4px;min-height:64px;border-radius:4px;background:${color};flex-shrink:0"></div>
          <div class="flex-1">
            <div class="flex items-center gap-3 mb-2 flex-wrap">
              <span class="text-4xl font-bold mer-code" style="color:${color};text-shadow:0 0 20px ${color}66">${esc(label)}</span>
              ${merInfo.code ? `<span class="text-sm text-[#8b90a0]">${merInfo.code}</span>` : ''}
              ${merInfo.nameFr ? `<span class="text-xs text-[#414755]">${esc(merInfo.nameFr)}</span>` : ''}
            </div>
            <h2 class="text-2xl font-bold text-[#e2e2e2] mb-1" style="font-family:'Hanken Grotesk',sans-serif">Меридиан ${esc(merInfo.name || mer)}</h2>
            <div class="flex items-center gap-3 text-sm text-[#8b90a0]">
              <span>Стихия: <span style="color:${color}">${esc(merInfo.element || '—')}</span></span>
              <span>·</span>
              <span>${merCodes.length} точек</span>
            </div>
          </div>
        </div>
        <div class="rounded-xl overflow-hidden bg-[#0e0e0e]">
          <video controls class="w-full block rounded-xl" src="${merVid}"
                 style="max-height:200px;object-fit:contain"
                 controlsList="nodownload noremoteplayback" disablePictureInPicture
                 oncontextmenu="return false"
                 onerror="this.closest('div').style.display='none'">
          </video>
        </div>
        <div class="text-[10px] text-[#414755] text-right mt-1 px-1">© П. В. Белоусов — zhong-yi.narod.ru</div>
      </div>

      ${signs ? `
      <div class="grid grid-cols-2 gap-4 mb-5">
        <div class="glass-panel rounded-xl p-4">
          <div class="text-[10px] text-[#FF9500] uppercase tracking-widest mb-3 flex items-center gap-1.5">
            <span class="material-symbols-outlined" style="font-size:14px">arrow_upward</span>
            Симптомы избытка
          </div>
          <div>${signs.excess.split(',').map(s => badge(s.trim(), '#FF9500')).join('')}</div>
        </div>
        <div class="glass-panel rounded-xl p-4">
          <div class="text-[10px] text-[#5a8fa8] uppercase tracking-widest mb-3 flex items-center gap-1.5">
            <span class="material-symbols-outlined" style="font-size:14px">arrow_downward</span>
            Симптомы недостатка
          </div>
          <div>${signs.defic.split(',').map(s => badge(s.trim(), '#5a8fa8')).join('')}</div>
        </div>
      </div>` : ''}

      <div class="text-[10px] text-[#8b90a0] uppercase tracking-widest mb-3 flex items-center gap-2">
        <span class="material-symbols-outlined" style="font-size:14px;color:${color}">adjust</span>
        Точки меридиана · ${merCodes.length}
      </div>
      <div class="grid grid-cols-2 gap-3 mb-6">
        ${merCodes.map(ptCard).join('')}
      </div>
    </div>`;
}

window.openPointFromMeridian = (code) => {
  setMer('all');
  selectPoint(code);
  const btn = document.getElementById(`li_${code}`);
  if (btn) btn.scrollIntoView({ block: 'center', behavior: 'smooth' });
};

window.setMer = (mer) => {
  activeMer = mer;
  document.getElementById('panel-static').classList.add('hidden');
  if (mer !== 'all') {
    activeSection = 'catalog';
    document.getElementById('panel-catalog').classList.add('hidden');
    document.getElementById('panel-meridian').classList.remove('hidden');
    document.getElementById('meridian-content').innerHTML = buildMeridianPage(mer);
  } else {
    document.getElementById('panel-meridian').classList.add('hidden');
    document.getElementById('panel-catalog').classList.remove('hidden');
    renderList();
  }
  buildMerTabs();
  updateAtlasSidebar();
  updateMobAtlasNav();
};

function getFilteredCodes(q='') {
  return allCodes.filter(code => {
    if (activeMer !== 'all') {
      const m = code.match(/^([A-Za-z]+)/);
      if (!m || m[1] !== activeMer) return false;
    }
    if (q) {
      const qLow  = q.toLowerCase();
      const qNorm = q.replace(/\s+/g, '').toLowerCase();
      const pt = points[code] || {};
      const codeLow  = code.toLowerCase();
      const textSearch = ((pt.cn_name||'') + ' ' + (pt.indica||'') + ' ' + (pt.location||'')).toLowerCase();
      if (!codeLow.includes(qNorm) && !textSearch.includes(qLow)) return false;
    }
    return true;
  });
}

function renderList(q='') {
  const codes = getFilteredCodes(q);
  const list = document.getElementById('point-list');
  list.innerHTML = codes.map(code => {
    const pt = points[code] || {};
    const m = code.match(/^([A-Za-z]+)/);
    const mer = m?.[1];
    const merInfo = MERIDIANS[mer] || {};
    return `
      <button onclick="selectPoint('${code}')"
              id="li_${code}"
              class="w-full text-left px-3 py-2.5 rounded-lg transition-all flex items-center gap-3
                     ${activeCode===code
                       ? 'bg-[#00F2FF]/10 border border-[#00F2FF]/30 text-[#e2e2e2]'

window.openVidModal = (code) => {
  const pt = points[code] || {};
  const src = ptVideoSrc(code);
  document.getElementById('vm-code').textContent = code;
  document.getElementById('vm-name').textContent = pt.cn_name || '';
  document.getElementById('vm-info').textContent = pt.location || '';
  const vid = document.getElementById('vm-video');
  vid.src = src;
  vid.load();
  const modal = document.getElementById('vid-modal');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
};

window.closeVidModal = () => {
  const modal = document.getElementById('vid-modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
  const vid = document.getElementById('vm-video');
  vid.pause();
  vid.src = '';
};

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVidModal(); });

      const moxaBtn = (c) => `<button onclick="openVidModal('${c.trim()}')" class="font-mono text-xs px-2 py-1 rounded-lg bg-[#1f1f1f] text-[#FFD60A] hover:bg-[#FFD60A]/15 border border-[#414755] hover:border-[#FFD60A]/40 transition-all flex items-center gap-1"><span class="material-symbols-outlined text-xs">play_circle</span>${c.trim()}</button>`;
      const renderPts = (str, fn) => str ? str.split(',').map(fn).join('') : '<span class="text-xs text-[#414755]">—</span>';
      return `
        <p class="text-xs text-[#8b90a0] mb-4">Точки, не рекомендуемые для иглоукалывания и прижигания</p>
        <div class="grid grid-cols-2 gap-3" style="grid-auto-rows:1fr">
          ${DATA.map(d => `
            <div class="glass-panel rounded-xl p-4 border border-white/10 flex flex-col h-full">
              <div class="font-bold text-sm text-[#e2e2e2] mb-3" style="font-family:'Hanken Grotesk',sans-serif">${d.mer}</div>
              <div class="grid grid-cols-2 gap-4 flex-1">
                <div>
                  <div class="text-[10px] text-[#8b90a0] uppercase tracking-wide mb-2">🚫 Не колоть</div>
                  <div class="flex flex-wrap gap-1">${renderPts(d.needle, ptBtn)}</div>
                </div>
                <div>
                  <div class="text-[10px] text-[#FFD60A] uppercase tracking-wide mb-2">🔥 Не прижигать</div>
                  <div class="flex flex-wrap gap-1">${renderPts(d.moxa, moxaBtn)}</div>
                </div>
              </div>
            </div>`).join('')}
        </div>`;
    }
  },
};

let activeSection = 'catalog';

window.setSection = (sec) => {
  activeSection = sec;
  activeMer = 'all';
  document.getElementById('panel-meridian').classList.add('hidden');
  document.querySelectorAll('#section-tabs button').forEach(b => {
    const isA = b.id === `stab_${sec}`;
    b.className = `px-3 py-1.5 rounded-lg text-xs font-bold whitespace-nowrap transition-all ${isA
      ? 'bg-[#00F2FF]/15 text-[#00F2FF] border border-[#00F2FF]/30'
      : 'text-[#8b90a0] hover:text-white hover:bg-white/5'}`;
  });
  buildMerTabs();
  updateAtlasSidebar();
  updateMobAtlasNav();
  if (sec === 'catalog') {
    document.getElementById('panel-catalog').classList.remove('hidden');
    document.getElementById('panel-static').classList.add('hidden');
  } else {
    document.getElementById('panel-catalog').classList.add('hidden');
    document.getElementById('panel-static').classList.remove('hidden');
    document.getElementById('panel-static').classList.add('flex');
    const s = STATIC_SECTIONS[sec];
    document.getElementById('static-content').innerHTML = `
      <div class="flex items-center gap-3 mb-5 pb-4 border-b border-white/10">
        <span class="material-symbols-outlined" style="font-size:28px;color:${s.color};filter:drop-shadow(0 0 8px ${s.color}66)">${s.icon}</span>
        <h2 class="text-xl font-bold" style="font-family:'Hanken Grotesk',sans-serif;color:${s.color}">${s.title}</h2>
      </div>
    ` + s.content();
    const equalizeCards = () => {
      // Only target cards directly inside a grid (skips standard section's single panel)
      const cards = [...document.querySelectorAll('#static-content .grid > .glass-panel')];
      if (cards.length < 2) return;
      // Reset first so re-measurements are accurate
      cards.forEach(c => { c.style.height = ''; c.style.minHeight = ''; });
      // Measure after reset reflow
      requestAnimationFrame(() => {
        const maxH = Math.max(...cards.map(c => c.getBoundingClientRect().height));
        cards.forEach(c => { c.style.height = maxH + 'px'; c.style.boxSizing = 'border-box'; });
      });
    };
    // First pass — immediate layout
    requestAnimationFrame(equalizeCards);
    // Second pass — after fonts settle
    document.fonts.ready.then(() => setTimeout(equalizeCards, 30));
  }
};

// Search handler — always switch to catalog view when typing
document.getElementById('atlas-search').addEventListener('input', e => {
  const q = e.target.value;
  if (activeSection !== 'catalog' || activeMer !== 'all') {
    activeSection = 'catalog';
    activeMer = 'all';
    document.getElementById('panel-catalog').classList.remove('hidden');
    document.getElementById('panel-static').classList.add('hidden');
    document.getElementById('panel-meridian').classList.add('hidden');
    document.querySelectorAll('#section-tabs button').forEach(b => {
      b.className = 'px-3 py-1.5 rounded-lg text-xs font-bold whitespace-nowrap transition-all text-[#8b90a0] hover:text-white hover:bg-white/5';
    });
    buildMerTabs();
    updateAtlasSidebar();
    updateMobAtlasNav();
  }
  renderList(q);
});

document.addEventListener('keydown', e => {
  if (e.key==='/' && e.target.tagName!=='INPUT') {
    e.preventDefault();
    document.getElementById('atlas-search').focus();
  }
});
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
