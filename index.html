<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1,viewport-fit=cover" name="viewport"/>
<title>AcuTwin</title>
<link rel="stylesheet" href="tailwind.css?v=2">
<link href="fonts.css?v=2" rel="stylesheet"/>
<link href="design.css?v=3" rel="stylesheet"/>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#131313">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
#body-bg { position:fixed; top:0; right:0; bottom:0; left:16rem; pointer-events:none; z-index:0; overflow:hidden; }
.md\:ml-64 > * { position:relative; z-index:1; }
.complaint-chip {
  font-size:.7rem; font-weight:600; padding:3px 10px;
  border-radius:20px; border:1px solid #41475588;
  background:#1f1f1f; color:#8b90a0;
  cursor:pointer; transition:all .15s;
}
.complaint-chip:hover { border-color:#00F2FF88; color:#00F2FF; background:rgba(0,242,255,.08); }
</style>
</head>
<body class="bg-[#131313] text-[#e2e2e2] min-h-screen" style="font-family:'Inter',sans-serif">

<div id="nav-mount"></div>
<div id="body-bg"></div>

<div class="md:ml-64 flex flex-col min-h-screen">

  <header class="sticky top-0 z-40 bg-[rgba(255,255,255,0.06)] backdrop-blur-xl border-b border-white/10 h-16 flex items-center px-6 flex-shrink-0">
    <h2 class="text-lg font-bold" style="font-family:'Hanken Grotesk',sans-serif" data-i18n="dashboard:newVisitTitle">Запись пациента</h2>
  </header>

  <main class="flex-1 p-6 page-enter">
    <div class="max-w-2xl mx-auto">

      <!-- Form card -->
      <div class="glass-panel rounded-2xl p-6 mb-4">
        <div class="flex items-center gap-3 mb-6">
          <span class="material-symbols-outlined text-2xl text-[#00F2FF]">person_add</span>
          <h3 class="text-base font-bold" style="font-family:'Hanken Grotesk',sans-serif" data-i18n="dashboard:newAppointment">Новый приём</h3>
        </div>

        <form id="intake-form" class="space-y-5">

          <!-- Row: date + time -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-[10px] text-[#8b90a0] uppercase tracking-widest mb-1.5" data-i18n="dashboard:form.date">Дата</label>
              <input id="f-date" type="date"
                     class="w-full px-3 py-2.5 bg-[#1f1f1f] border border-[#414755] rounded-lg text-sm text-[#e2e2e2]
                            focus:outline-none focus:border-[#00F2FF] focus:ring-1 focus:ring-[#00F2FF]/30 transition-all"/>
            </div>
            <div>
              <label class="block text-[10px] text-[#8b90a0] uppercase tracking-widest mb-1.5" data-i18n="dashboard:form.time">Время</label>
              <input id="f-time" type="time"
                     class="w-full px-3 py-2.5 bg-[#1f1f1f] border border-[#414755] rounded-lg text-sm text-[#e2e2e2]
                            focus:outline-none focus:border-[#00F2FF] focus:ring-1 focus:ring-[#00F2FF]/30 transition-all"/>
            </div>
          </div>

          <!-- FIO -->
          <div class="relative">
            <label class="block text-[10px] text-[#8b90a0] uppercase tracking-widest mb-1.5" data-i18n="dashboard:form.patientName">ФИО пациента</label>
            <input id="f-fio" type="text" placeholder="Иванов Иван Иванович" data-i18n-placeholder="dashboard:form.namePlaceholder" autocomplete="off"
                   oninput="fioSuggest(this.value)"
                   onblur="setTimeout(()=>document.getElementById('fio-drop').classList.add('hidden'),150)"
                   class="w-full px-3 py-2.5 bg-[#1f1f1f] border border-[#414755] rounded-lg text-sm text-[#e2e2e2]
                          placeholder-[#414755] focus:outline-none focus:border-[#00F2FF] focus:ring-1 focus:ring-[#00F2FF]/30 transition-all"/>
            <div id="fio-drop"
                 class="hidden absolute left-0 right-0 top-full mt-1 z-50 rounded-xl border border-[#414755] bg-[#1f1f1f] shadow-xl overflow-hidden">
            </div>
          </div>

          <!-- Row: age + sex -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-[10px] text-[#8b90a0] uppercase tracking-widest mb-1.5" data-i18n="dashboard:form.age">Возраст</label>
              <input id="f-age" type="number" min="5" max="80" value="35"
                     class="w-full px-3 py-2.5 bg-[#1f1f1f] border border-[#414755] rounded-lg text-sm text-[#e2e2e2]
                            placeholder-[#414755] focus:outline-none focus:border-[#00F2FF] focus:ring-1 focus:ring-[#00F2FF]/30 transition-all"/>
            </div>
            <div>
              <label class="block text-[10px] text-[#8b90a0] uppercase tracking-widest mb-1.5" data-i18n="dashboard:form.gender">Пол</label>
              <select id="f-sex"
                      class="w-full px-3 py-2.5 bg-[#1f1f1f] border border-[#414755] rounded-lg text-sm text-[#e2e2e2]
                             focus:outline-none focus:border-[#00F2FF] focus:ring-1 focus:ring-[#00F2FF]/30 transition-all">
                <option value="" class="bg-[#1f1f1f]" data-i18n="dashboard:form.genderAny">— выбрать —</option>
                <option value="М" class="bg-[#1f1f1f]" data-i18n="dashboard:form.genderMale">Мужской</option>
                <option value="Ж" class="bg-[#1f1f1f]" data-i18n="dashboard:form.genderFemale">Женский</option>
              </select>
            </div>
          </div>

          <!-- Phone + Email -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-[10px] text-[#8b90a0] uppercase tracking-widest mb-1.5">Телефон</label>
              <input id="f-phone" type="tel" placeholder="+7 999 000-00-00"
                     class="w-full px-3 py-2.5 bg-[#1f1f1f] border border-[#414755] rounded-lg text-sm text-[#e2e2e2]
                            placeholder-[#414755] focus:outline-none focus:border-[#00F2FF] focus:ring-1 focus:ring-[#00F2FF]/30 transition-all"/>
            </div>
            <div>
              <label class="block text-[10px] text-[#8b90a0] uppercase tracking-widest mb-1.5">Email</label>
              <input id="f-email" type="email" placeholder="example@mail.ru"
                     class="w-full px-3 py-2.5 bg-[#1f1f1f] border border-[#414755] rounded-lg text-sm text-[#e2e2e2]
                            placeholder-[#414755] focus:outline-none focus:border-[#00F2FF] focus:ring-1 focus:ring-[#00F2FF]/30 transition-all"/>
            </div>
          </div>

          <!-- Doctor -->
          <div>
            <label class="block text-[10px] text-[#8b90a0] uppercase tracking-widest mb-1.5" data-i18n="dashboard:form.doctor">Лечащий врач</label>
            <input id="f-doctor" type="text" placeholder="Фамилия И.О." data-i18n-placeholder="dashboard:form.doctorPlaceholder"
                   class="w-full px-3 py-2.5 bg-[#1f1f1f] border border-[#414755] rounded-lg text-sm text-[#e2e2e2]
                          placeholder-[#414755] focus:outline-none focus:border-[#00F2FF] focus:ring-1 focus:ring-[#00F2FF]/30 transition-all"/>
          </div>

          <!-- Reason -->
          <div>
            <label class="block text-[10px] text-[#8b90a0] uppercase tracking-widest mb-1.5" data-i18n="dashboard:form.reason">Причина приёма / жалобы</label>
            <!-- Шаблоны жалоб -->
            <div id="complaint-chips" class="flex flex-wrap gap-1.5 mb-2"></div>
            <textarea id="f-reason" rows="3" placeholder="Опишите основные жалобы пациента..." data-i18n-placeholder="dashboard:form.reasonPlaceholder"
                      class="w-full px-3 py-2.5 bg-[#1f1f1f] border border-[#414755] rounded-lg text-sm text-[#e2e2e2]
                             placeholder-[#414755] focus:outline-none focus:border-[#00F2FF] focus:ring-1 focus:ring-[#00F2FF]/30 transition-all resize-none leading-relaxed"></textarea>
          </div>

          <!-- Submit -->
          <div class="flex gap-3 pt-1">
            <button type="button" onclick="goToTreatment()"
               class="w-full flex items-center justify-center gap-2 py-3 bg-[#0A84FF]/15 hover:bg-[#0A84FF]/25
                      text-[#0A84FF] border border-[#0A84FF]/40 rounded-xl font-bold text-sm transition-colors">
              <span class="material-symbols-outlined text-base">arrow_forward</span>
              <span data-i18n="dashboard:visit.toTreatment">К тактике лечения</span>
            </button>
          </div>
        </form>
      </div>

      <!-- Duplicate modal -->
      <div id="dup-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(0,0,0,0.7);backdrop-filter:blur(4px)">
        <div class="w-full max-w-md rounded-2xl border border-[#414755] bg-[#141414] shadow-2xl overflow-hidden">
          <div class="flex items-center gap-3 px-5 py-4 border-b border-[#2a2a2a]">
            <span class="material-symbols-outlined text-[#FF9F0A]" style="font-size:22px;zoom:1">warning</span>
            <span class="font-bold text-[#e2e2e2] text-base">Найдены возможные совпадения</span>
          </div>
          <div id="dup-list" class="px-5 py-4 space-y-3 max-h-64 overflow-y-auto"></div>
          <div class="flex gap-3 px-5 py-4 border-t border-[#2a2a2a]">
            <button id="dup-cancel" class="flex-1 py-2.5 rounded-xl border border-[#414755] text-sm text-[#8b90a0] hover:text-[#e2e2e2] hover:border-[#8b90a0] transition-colors font-medium">Отмена</button>
            <button id="dup-create" class="flex-1 py-2.5 rounded-xl bg-[#0A84FF]/15 border border-[#0A84FF]/40 text-sm text-[#0A84FF] hover:bg-[#0A84FF]/25 transition-colors font-bold">Создать нового всё равно</button>
          </div>
        </div>
      </div>

      <!-- Success toast (hidden) -->
      <div id="toast" class="hidden glass-panel rounded-xl p-4 flex items-center gap-3 border border-[#00F2FF]/30 mb-4">
        <span class="material-symbols-outlined text-[#00F2FF]">check_circle</span>
        <span class="text-sm text-[#e2e2e2]" data-i18n="dashboard:visit.saved">Запись сохранена</span>
      </div>

      <!-- Recent appointments -->
      <div class="glass-panel rounded-2xl p-6">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-bold text-[#8b90a0] uppercase tracking-wider" data-i18n="dashboard:recent.title">Последние записи</h3>
          <a href="history.html" class="text-xs text-[#0A84FF] hover:text-[#adc6ff] transition-colors" data-i18n="dashboard:recent.allHistory">Вся история →</a>
        </div>
        <!-- Поиск пациента -->
        <div class="relative mb-3">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#8b90a0]" style="font-size:16px;zoom:1">search</span>
          <input id="recent-search" type="text" placeholder="Найти пациента..." data-i18n-placeholder="dashboard:recent.search"
                 oninput="renderRecent(this.value)"
                 class="w-full pl-9 pr-4 py-2 bg-[#1a1a1a] border border-[#414755] rounded-xl text-sm text-[#e2e2e2]
                        placeholder-[#414755] focus:outline-none focus:border-[#00F2FF] transition-all"/>
        </div>
        <div id="recent-list" class="space-y-2"></div>
      </div>

    </div>
  </main>
</div>

<script type="module">
import { buildSidebar, initElementClock, esc, uniqueId } from './shared.js';
import { requireAuth } from './auth.js';
import { apiGetRecords, apiAddRecord } from './api.js';
import { initI18n, t } from '/i18n.js';

const session = await requireAuth();
if (!session) throw new Error('redirect');
await initI18n();
document.title = t('dashboard:pageTitle');

document.getElementById('nav-mount').innerHTML = buildSidebar('index', session);
initElementClock();

const now = new Date();
document.getElementById('f-date').value = now.toISOString().slice(0,10);
document.getElementById('f-time').value = now.toTimeString().slice(0,5);
document.getElementById('f-doctor').value = session.name;

// Сброс формы к дефолтам (перекрываем browser autocomplete)
document.getElementById('f-age').value = '35';
['f-fio','f-sex','f-phone','f-email','f-reason'].forEach(id => {
  const el = document.getElementById(id); if (el) el.value = '';
});

// ── Подстановка пациента из расписания ───────────────────
{
  const qs = new URLSearchParams(window.location.search);
  const p = qs.get('patient');
  const apptId = qs.get('appointmentId');
  const reason = qs.get('reason');
  if (p) document.getElementById('f-fio').value = p;
  if (reason) {
    const r = document.getElementById('f-reason');
    if (r && !r.value) r.value = reason;
  }
  if (apptId) {
    window._appointmentId = apptId;
    sessionStorage.setItem('acutwin_appointment_id', apptId);
  }
}

// ── Records helpers ──────────────────────────────────────
let _cachedRecords = [];
async function loadRecords() {
  _cachedRecords = await apiGetRecords();
}
function allRecords() { return _cachedRecords; }
function myRecords()  { return _cachedRecords.filter(r => r.doctor === session.username); }
async function saveRecord(rec) { await apiAddRecord(rec); _cachedRecords.unshift(rec); }

await loadRecords();

// ── Шаблоны жалоб ────────────────────────────────────────
const DEFAULT_COMPLAINTS = [
  { label: 'Боль в спине',    full: 'Боль в спине' },    /* i18n-ok */
  { label: 'Головная боль',   full: 'Головная боль' },   /* i18n-ok */
  { label: 'Бессонница',      full: 'Бессонница' },      /* i18n-ok */
  { label: 'Давление',        full: 'Повышенное давление' }, /* i18n-ok */
  { label: 'Усталость',       full: 'Усталость, упадок сил' }, /* i18n-ok */
  { label: 'Суставы',         full: 'Боли в суставах' }, /* i18n-ok */
  { label: 'Желудок',         full: 'Нарушение пищеварения, вздутие' }, /* i18n-ok */
  { label: 'Стресс',          full: 'Тревожность, стресс' }, /* i18n-ok */
  { label: 'Остеохондроз',    full: 'Остеохондроз' },    /* i18n-ok */
  { label: 'Онемение',        full: 'Онемение конечностей' }, /* i18n-ok */
];
const HISTORY_THRESHOLD = 10; // при скольких посещениях переключаться на динамику

function renderComplaintChips() {
  const wrap = document.getElementById('complaint-chips');
  if (!wrap) return;
  const recs = isBoss ? allRecords() : myRecords();
  let chips;

  if (recs.length >= HISTORY_THRESHOLD) {
    // Считаем частоту жалоб из истории
    const freq = {};
    recs.forEach(r => {
      if (!r.reason) return;
      r.reason.split(',').forEach(part => {
        const t = part.trim();
        if (t.length > 2) freq[t] = (freq[t] || 0) + 1;
      });
    });
    const top = Object.entries(freq)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 10)
      .map(([text, cnt]) => ({ label: text, full: text, cnt }));
    chips = top.length ? top : DEFAULT_COMPLAINTS;
  } else {
    chips = DEFAULT_COMPLAINTS;
  }

  wrap.innerHTML =
    `<span class="text-[10px] text-[#8b90a0] self-center mr-1">${t('dashboard:recent.quick')}</span>` +
    chips.map(c =>
      `<button type="button" onclick='addComplaint(${JSON.stringify(c.full).replace(/'/g,"&#39;")})' class="complaint-chip">${esc(c.label)}</button>`
    ).join('');
}

// ── Переход к тактике лечения с данными пациента ─────────
let _navigating = false;

function _doNavigate() {
  const patient = document.getElementById('f-fio').value.trim();
  const data = {
    patient,
    age:    document.getElementById('f-age').value || '',
    gender: document.getElementById('f-sex').value || '',
    reason: document.getElementById('f-reason').value.trim() || '',
    phone:  document.getElementById('f-phone').value.trim() || '',
    email:  document.getElementById('f-email').value.trim() || '',
  };
  sessionStorage.setItem('acutwin_new_appointment', '1');
  sessionStorage.setItem('acutwin_diag_patient', JSON.stringify(data));
  const apptId = sessionStorage.getItem('acutwin_appointment_id');
  if (apptId) sessionStorage.removeItem('acutwin_appointment_id');
  location.href = 'treatment.html' + (apptId ? '?appointmentId=' + encodeURIComponent(apptId) : '');
}

window.goToTreatment = async () => {
  if (_navigating) return;
  const patient = document.getElementById('f-fio').value.trim();
  if (!patient) { alert(t('dashboard:alert.enterName')); return; }
  const ageVal = +document.getElementById('f-age').value;
  if (document.getElementById('f-age').value !== '' && (ageVal < 5 || ageVal > 80 || !Number.isInteger(ageVal))) {
    alert(t('dashboard:alert.ageRange')); return;
  }
  const phone = document.getElementById('f-phone').value.trim();
  const email = document.getElementById('f-email').value.trim();
  let candidates = [];
  try {
    const r = await fetch('/api/patients/check-duplicate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + (sessionStorage.getItem('acutwin_token') || '') },
      body: JSON.stringify({ fullName: patient, phone, email }),
    });
    if (r.ok) { const d = await r.json(); candidates = d.candidates || []; }
  } catch (e) { console.warn('check-duplicate failed, proceeding', e); }

  if (!candidates.length) { _navigating = true; _doNavigate(); return; }

  const matchLabel = { phone: 'телефон', email: 'email', name: 'имя' };
  const list = document.getElementById('dup-list');
  list.innerHTML = candidates.map(c => {
    const tags = c.matchBy.map(m => `<span style="background:rgba(255,159,10,0.15);color:#FF9F0A;border:1px solid rgba(255,159,10,0.3);border-radius:6px;padding:1px 6px;font-size:10px">${matchLabel[m] || m}</span>`).join(' ');
    const lastVisit = c.lastVisitAt ? new Date(c.lastVisitAt).toLocaleDateString('ru-RU') : '—';
    const safePatient = JSON.stringify(c.fullName).replace(/'/g,"&#39;");
    return `<div style="background:#1f1f1f;border:1px solid #2a2a2a;border-radius:12px;padding:12px 14px">
      <div class="flex items-start justify-between gap-2">
        <div>
          <div class="font-semibold text-sm text-[#e2e2e2] mb-1">${esc(c.fullName)}</div>
          <div class="text-xs text-[#8b90a0]">${c.phone ? esc(c.phone) + ' · ' : ''}${c.email ? esc(c.email) + ' · ' : ''}последний приём: ${lastVisit}</div>
          <div class="mt-1.5 flex gap-1">${tags}</div>
        </div>
        <button onclick='openExistingPatient(${safePatient})'
          class="flex-shrink-0 text-xs font-bold text-[#0A84FF] border border-[#0A84FF]/40 rounded-lg px-3 py-1.5 hover:bg-[#0A84FF]/15 transition-colors whitespace-nowrap">
          Открыть
        </button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('dup-modal').classList.remove('hidden');
};

window.openExistingPatient = (patientName) => {
  document.getElementById('dup-modal').classList.add('hidden');
  sessionStorage.setItem('acutwin_patient_view', patientName);
  location.href = 'patient.html';
};

// #dup-modal выносим на уровень <body>: у предка <main.page-enter> есть transform,
// из-за чего position:fixed отсчитывается от него, а не от экрана — на мобильном
// карточка дубля центрировалась ниже видимой области (фон затемнён, контента не видно).
(() => {
  const dm = document.getElementById('dup-modal');
  if (dm && dm.parentElement !== document.body) document.body.appendChild(dm);
})();

document.getElementById('dup-cancel').addEventListener('click', () => {
  document.getElementById('dup-modal').classList.add('hidden');
  _navigating = false;
});
document.getElementById('dup-create').addEventListener('click', () => {
  document.getElementById('dup-modal').classList.add('hidden');
  _navigating = true;
  _doNavigate();
});

// ── Автозаполнение ФИО ───────────────────────────────────
window.fioSuggest = (q) => {
  const drop = document.getElementById('fio-drop');
  if (!q.trim()) { drop.classList.add('hidden'); return; }
  const rawAll = allRecords();
  const all = isBoss ? rawAll : rawAll.filter(r => r.doctor === session.username);
  // Уникальные пациенты, последняя запись для каждого
  const map = {};
  all.forEach(r => { if (!map[r.patient] || r.date > map[r.patient].date) map[r.patient] = r; });
  const matches = Object.values(map)
    .filter(r => r.patient.toLowerCase().includes(q.toLowerCase()))
    .sort((a,b) => b.date.localeCompare(a.date))
    .slice(0, 6);
  if (!matches.length) { drop.classList.add('hidden'); return; }
  drop.innerHTML = matches.map(r => {
    const meta = [r.gender ? (r.gender === 'М' ? '♂' : '♀') : '', r.age ? r.age + ' лет' /* i18n-ok */ : ''].filter(Boolean).join(' ');
    const safeR = JSON.stringify(r).replace(/'/g,"&#39;");
    return `<button type="button" onmousedown='fillPatient(${safeR})'
      class="w-full flex items-center justify-between gap-2 px-3 py-2 hover:bg-[#00F2FF]/10 transition-colors text-left min-w-0">
      <span class="text-sm text-[#e2e2e2] font-semibold truncate max-w-[220px]">${esc(r.patient)}</span>
      <span class="text-[10px] text-[#8b90a0] flex-shrink-0">${esc(meta)}</span>
    </button>`;
  }).join('<div class="border-t border-[#2a2a2a]"></div>');
  drop.classList.remove('hidden');
};

window.fillPatient = (r) => {
  document.getElementById('f-fio').value   = r.patient;
  document.getElementById('f-age').value   = r.age    || '35';
  document.getElementById('f-sex').value   = r.gender || '';
  document.getElementById('f-phone').value = r.phone  || '';
  document.getElementById('f-email').value = r.email  || '';
  document.getElementById('fio-drop').classList.add('hidden');
};

window.addComplaint = (text) => {
  const ta = document.getElementById('f-reason');
  ta.value = ta.value ? ta.value.trimEnd() + ', ' + text : text;
  ta.focus();
};

// ── Статус лечения ────────────────────────────────────────
const STATUS_MAP = {
  started:   { key: 'dashboard:status.started',   color: '#0A84FF' },
  active:    { key: 'dashboard:status.active',     color: '#FFD60A' },
  completed: { key: 'dashboard:status.completed',  color: '#5AC85A' },
};
function statusBadge(status) {
  const s = STATUS_MAP[status];
  if (!s) return '';
  return `<span style="font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:10px;
    background:${s.color}18;border:1px solid ${s.color}55;color:${s.color}">${t(s.key)}</span>`;
}

// ── Последние записи ─────────────────────────────────────
const isBoss = session.role === 'boss';
function renderRecent(query = '') {
  const list = document.getElementById('recent-list');
  let recs = (isBoss ? allRecords() : myRecords());
  if (query) recs = recs.filter(r => r.patient?.toLowerCase().includes(query.toLowerCase()));
  recs = recs.slice(0, 10);
  if (!recs.length) {
    list.innerHTML = `<div class="text-sm text-[#8b90a0] text-center py-4">${query ? t('dashboard:recent.notFound') : t('dashboard:recent.noRecords')}</div>`;
    return;
  }
  list.innerHTML = recs.map((r) => {
    const recJson = JSON.stringify({ patient: r.patient, age: r.age||'', gender: r.gender||'', reason: '' });
    return `
    <div class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-[#1f1f1f]">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-0.5">
          <button onclick='sessionStorage.setItem("acutwin_patient_view",${JSON.stringify(r.patient)});location.href="patient.html"'
                  class="text-sm font-semibold text-[#e2e2e2] hover:text-[#00F2FF] transition-colors text-left truncate max-w-[200px]">${esc(r.patient)}</button>
        </div>
        <div class="text-[10px] text-[#8b90a0]">${r.date} · ${esc(r.reason || '—')}</div>
      </div>
      ${isBoss && r.doctorName ? `<span class="text-[10px] px-1.5 py-0.5 rounded bg-[#0A84FF]/10 text-[#0A84FF]">${esc(r.doctorName)}</span>` : `<span class="text-[10px] font-mono text-[#8b90a0]">${esc(r.gender || '')}</span>`}
      <button onclick='sessionStorage.setItem("acutwin_diag_patient",${JSON.stringify(recJson)});location.href="treatment.html"'
              title="${t('dashboard:visit.toTreatment')}"
              class="flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-[#0A84FF]/10 hover:bg-[#0A84FF]/20 text-[#0A84FF] border border-[#0A84FF]/30 transition-colors text-[10px] font-bold flex-shrink-0">
        <span class="material-symbols-outlined" style="font-size:13px;zoom:1">medical_services</span>
        ${t('dashboard:visit.recipe')}
      </button>
    </div>`;
  }).join('');
}
renderRecent();
renderComplaintChips();

// ── Submit (Enter в форме = переход к лечению) ───────────
document.getElementById('intake-form').addEventListener('submit', e => {
  e.preventDefault();
  goToTreatment();
});
</script>
